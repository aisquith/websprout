<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Websprout Preview</title>
<style>*{margin:0;padding:0}body,html{height:100%;width:100%}iframe{border:none;width:100%;height:100vh;display:block}</style>
</head>
<body>
<iframe id="f" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
<script>
  const html = localStorage.getItem('ws_preview_html');
  if (html && html.length > 50) {
    document.getElementById('f').srcdoc = html;
  } else {
    document.body.innerHTML = '<div style="font-family:sans-serif;padding:3rem;text-align:center"><h2>No preview found</h2><p style="margin-top:1rem;color:#666">Go back, generate a site, then click Open live preview.</p><br><a href="/">← Back</a></div>';
  }
</script>
</body>
</html>
